<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数学练习</title>
    <meta name="theme-color" content="#fff7c8" />
    <meta name="apple-mobile-web-app-title" content="数学练习" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button class="sound-button" id="sound-button" type="button" aria-pressed="false" aria-label="开启背景音乐">♪</button>
    <main class="app">
      <section class="panel" id="setup-screen">
        <div class="mascot" aria-hidden="true">
          <span class="ear left"></span>
          <span class="ear right"></span>
          <span class="face">^_^</span>
        </div>
        <h1>数学小乐园</h1>
        <p class="subtitle">选一种题型，一次练习 20 道。</p>

        <div class="category-list" role="radiogroup" aria-label="题目类别">
          <label class="category-card">
            <input type="radio" name="category" value="add" checked />
            <span class="icon">+</span>
            <span>
              <strong>20以内的加法</strong>
              <small>答案不超过 20</small>
            </span>
          </label>

          <label class="category-card">
            <input type="radio" name="category" value="subtract" />
            <span class="icon">-</span>
            <span>
              <strong>20以内的减法</strong>
              <small>答案不小于 0</small>
            </span>
          </label>

          <label class="category-card">
            <input type="radio" name="category" value="compare" />
            <span class="icon">&lt;&gt;</span>
            <span>
              <strong>10000以内比大小</strong>
              <small>选择大于、小于或等于</small>
            </span>
          </label>

          <label class="category-card">
            <input type="radio" name="category" value="mixed" />
            <span class="icon">?</span>
            <span>
              <strong>加减法关系</strong>
              <small>随机求加数、和、减数、被减数或差</small>
            </span>
          </label>

          <label class="category-card">
            <input type="radio" name="category" value="multiply-divide" />
            <span class="icon">×÷</span>
            <span>
              <strong>乘除法关系</strong>
              <small>随机求乘数、被除数或除数</small>
            </span>
          </label>
        </div>

        <button class="primary-button" id="start-button">开始练习</button>
      </section>

      <section class="panel hidden" id="quiz-screen" aria-live="polite">
        <div class="top-row">
          <button class="ghost-button" id="back-button" type="button">返回</button>
          <div class="timer-text" id="timer-text" aria-live="off">用时：0 秒</div>
          <div class="progress-text" id="progress-text">第 1 / 20 题</div>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <span id="progress-fill"></span>
        </div>

        <div class="question-card">
          <div class="star star-one"></div>
          <div class="star star-two"></div>
          <p class="question-label">请回答</p>
          <div class="question-content">
            <div class="question" id="question-text">1 + 1 = ?</div>
            <div class="formula-hint hidden" id="formula-hint"></div>
          </div>
        </div>

        <form class="answer-area" id="answer-form">
          <input
            id="answer-input"
            type="number"
            inputmode="numeric"
            autocomplete="off"
            placeholder="输入答案"
            aria-label="答案"
            required
          />
          <button class="primary-button" type="submit">提交</button>
        </form>

        <div class="choice-area hidden" id="choice-area" aria-label="选择比较结果">
          <button class="choice-button" type="button" data-answer=">">&gt;</button>
          <button class="choice-button" type="button" data-answer="<">&lt;</button>
          <button class="choice-button" type="button" data-answer="=">=</button>
        </div>

        <div class="feedback" id="feedback" aria-live="assertive"></div>
      </section>

      <section class="panel celebration hidden" id="finish-screen">
        <div class="confetti" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="trophy" aria-hidden="true">★</div>
        <h2>全部答对啦！</h2>
        <p>20 道题都完成了，太棒了。</p>
        <p class="elapsed-time" id="elapsed-time">本次用时：0 秒</p>
        <button class="primary-button" id="restart-button" type="button">再练一次</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
