# 10篇小童话

## 1. 佩奇和苏西找会跳舞的叶子

小猪佩奇和小羊苏西去森林里捡叶子。

“我要找一片会跳舞的叶子。”佩奇说。

“叶子怎么会跳舞？”苏西问。

这时，一片金叶子从树上落下来，转一圈，跳一下，又转一圈，又跳一下。

“它会！”佩奇追了上去。

金叶子跳进草丛。佩奇钻进去，头上沾了三根草。苏西笑得咩咩叫。

金叶子又跳到小溪边。佩奇差点踩进水里。

“停！”苏西说，“它不是乱跳，它被风吹着走。”

她们举起小篮子，等风一吹，金叶子就“扑”的一声跳进篮子里。

回家后，佩奇把叶子放在桌上。她轻轻吹一口气，金叶子又转了一圈。

苏西说：“现在我也相信了，它真的很会跳舞。”

## 2. 瑞贝卡的小蓝盒大逃跑

小兔瑞贝卡有一个小蓝盒。她要把河边最漂亮的贝壳装进去。

小狗丹尼陪她一起找。他们找到一枚白贝壳，像小月亮。

瑞贝卡把贝壳放进盒子里。“嗒！”盒子关好了。

可是她刚把盒子放到石头上，小蓝盒就顺着斜坡滑走了。

“我的盒子逃跑啦！”瑞贝卡大叫。

丹尼汪汪追，瑞贝卡蹦蹦追。小蓝盒滚过草地，撞到一朵蘑菇，又弹到浅水边。

丹尼停下来闻了闻。“它会往低处跑，我们去小水沟前面等。”

他们跑到小水沟前。小蓝盒果然“咚”地撞进丹尼的帽子里。

瑞贝卡打开盒子，小月亮贝壳还好好的。

“它不是逃跑。”丹尼说，“它只是坐了一次滑梯。”

瑞贝卡抱着盒子说：“下次滑梯，要先告诉我！”

## 3. 琪琪的飞行图乱飞了

魔女琪琪画了一张飞行图，准备送给索纳姐姐。图上有屋顶、钟楼和一条弯弯的小路。

黑猫吉吉看了看天空。“今天的风有点调皮。”

琪琪刚把图放进篮子，风就“呼啦”一下，把飞行图卷走了。

“站住！”琪琪骑上扫帚追。

飞行图飞到树梢。琪琪伸手，没抓到。

飞行图飞到屋顶。琪琪又伸手，还是没抓到。

吉吉蹲在墙头说：“别追它，看它要去哪儿。”

琪琪停下来一看，树叶、纸片和飞行图都往钟楼后面的小巷飞。

“我知道了！”琪琪骑到小巷口，张开篮子。

飞行图转呀转，正好掉进篮子里。

索纳姐姐收到图，笑着说：“这张图一定认识路，它自己先飞了一遍。”

## 4. 向日葵和叮咚种子

向日葵在花园里晒太阳，忽然听见泥土里“叮咚”一声。

豌豆射手马上探头：“是谁在敲门？”

他们扒开泥土，发现一颗圆圆的小种子。

“它会唱歌！”豌豆射手说。

他们把种子种进小坑。向日葵浇水，豌豆射手守门。

第二天一早，小坑空了。

“种子跑了！”豌豆射手急得喷出一颗豌豆，“啪！”

向日葵看见地上有一串湿泥点。“它没有脚，可能是水把它冲走了。”

他们顺着泥点找，找到水桶后面。小种子卡在那里，小声“叮……咚……”

豌豆射手搬来小石子，围成一圈小围墙。向日葵重新把种子种好。

几天后，嫩芽冒出来了。风一吹，叶子叮咚叮咚响。

豌豆射手说：“这次它不跑了，它开音乐会了！”

## 5. 红星纸飞机救援队

小月折了一只纸飞机，翅膀上画着一颗红星。

小梅说：“让它飞到大树那边吧。”

小月用力一扔。纸飞机“嗖”地飞出去，飞过草地，飞过小路，最后卡在高高的树枝上。

小月跳了三下，够不到。

小梅搬来小凳子，还是够不到。

乌鸦多多飞来问：“你们在摘苹果吗？”

“不是，是救飞机！”小月说。

多多飞上树枝看了看：“飞机卡在第三根树枝，尾巴被叶子夹住了。”

小梅找来竹竿。多多在上面指挥：“左一点，右一点，别戳我的脚！”

竹竿轻轻一拨，纸飞机“哗啦”落下来。

小月接住飞机，红星还亮亮的。

多多说：“下次它再飞高一点，我就收停机费。”

## 6. 钥匙不想上班

倭瓜校长早晨要打开图书角，可是钥匙不见了。

“钥匙迟到了！”莲小蓬说。

树桩老师翻口袋，倭瓜校长翻抽屉，莲小蓬翻书包。没有，还是没有。

图书角门后传来同学们的声音：“我们想看书！”

倭瓜校长急得在原地转圈。“昨天我还拿着它去花坛扶小花。”

三个人跑到花坛边。泥土上有一个小印子，像钥匙躺过。

树桩老师拨开叶子，没有。

莲小蓬低头一看：“花盆下面有东西亮了一下！”

他们合力抬起花盆。钥匙躺在下面，身上全是泥。

“它不是迟到。”树桩老师说，“它在帮小花压住花盆。”

倭瓜校长擦干净钥匙，打开图书角。第一本被借走的书，名字叫《钥匙今天很忙》。

## 7. 雪城堡点灯大会

冰西瓜和充能柚子在雪地里造城堡。

冰西瓜负责堆墙：“一块，两块，三块！”

充能柚子负责小灯：“一盏，两盏，三盏！”

城堡快造好时，小灯袋不见了。

“点灯大会要失败了！”充能柚子急得跳起来，身上的电光噼啪响。

冰西瓜蹲下看雪地。“这里有深脚印，是我的。这里有浅脚印，像小灯袋拖出来的。”

他们顺着浅脚印走。脚印绕过城堡，绕过雪球，最后停在小松树旁。

小灯袋挂在树枝上，被风吹得一晃一晃。

充能柚子踮脚够不到。冰西瓜滚来一个雪球，当小台阶。

“够到了！”充能柚子拿回小灯。

傍晚，小灯一盏盏亮起。雪城堡变成蓝蓝亮亮的。

冰西瓜宣布：“点灯大会开始！”

充能柚子小声说：“下次，小灯袋也要买门票。”

## 8. 胖胖追午餐篮

胖猫胖胖和白猫莉莉去草坡野餐。

胖胖带了午餐篮。里面有鱼饼、苹果和一块小花布。

他刚坐下，风一吹，篮子就骨碌骨碌滚走了。

“我的鱼饼！”胖胖拔腿就追。

莉莉喊：“别直追，篮子会往坡下滚！”

胖胖还是追。他追得太快，自己也骨碌一下滚到草地上。

“我也变成篮子了！”胖胖晕乎乎地说。

莉莉沿着小路跑到坡底，张开小花布。午餐篮正好滚过来，“扑通”一下停在布上。

胖胖爬起来，拍掉身上的草。苹果滚出来三个，鱼饼还在。

莉莉找来一块石头，压住篮子。

风又吹了一下。篮子不动了。胖胖赶紧抱住鱼饼。

“这次，”他说，“我要先吃会逃跑的那一块。”

## 9. 希达的线团迷宫

巴鲁和希达在山坡上放风筝。风筝上画着一朵白云。

风一来，风筝飞得又高又远。

希达摸摸口袋：“备用线团不见了！”

原来口袋被树枝刮破，线团滚进了草丛。

风筝越飞越高，线越来越短。

“我拉住风筝，你找线团！”希达说。

巴鲁趴在草地上看。草叶被压弯了一条细细的路，像小迷宫。

他顺着草路爬，钻过蒲公英，绕过扁石头，最后听见“咕噜”一声。

线团卡在石头后面，还想继续滚。

“抓到你了！”巴鲁把线团抱回来。

他们把新线接上，风筝又稳稳飞起来。

希达低头看破口袋，说：“回家第一件事，补口袋。”

巴鲁说：“第二件事，给线团系安全带。”

## 10. 太阳没有来摇铃

斑马苏怡和小春负责摇午睡铃。

平时，太阳照到窗台上的铃铛，她们就“叮铃铃”摇铃。

这天，云把天空盖住了。铃铛一直灰灰的。

小春着急地问：“没有太阳，大家会不会睡到吃晚饭？”

苏怡想了想：“太阳请假了，我们不能请假。”

她们先看小钟，可小钟停了。

她们又听小鸟叫，可小鸟也在午睡。

最后，苏怡想起走廊尽头有一个沙漏。她们把沙漏拿来，看沙子沙沙往下落。

沙子落完一次，小春翻一次。落完三次，苏怡拿起铃铛。

“叮铃铃！叮铃铃！”

大家醒来了。有人揉眼睛，有人伸懒腰。

过了一会儿，太阳从云后钻出来，照亮铃铛。

小春说：“太阳迟到了。”

苏怡说：“没关系，我们已经替它上班了。”
