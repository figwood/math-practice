# 29篇小童话

## 1. 佩奇和苏西找会跳舞的叶子

小猪佩奇和小羊苏西去森林里捡叶子。

“我要找一片会跳舞的叶子。”佩奇说。

“叶子怎么会跳舞？”苏西问。

这时，一片金叶子从树上落下来，转一圈，跳一下，又转一圈，又跳一下。

“它会！”佩奇追了上去。

金叶子跳进草丛。佩奇钻进去，头上沾了三根草。苏西笑得咩咩叫。

金叶子又跳到小溪边。佩奇差点踩进水里。

“停！”苏西说，“它不是乱跳，它被风吹着走。”

她们举起小篮子，等风一吹，金叶子就“扑”的一声跳进篮子里。

回家后，佩奇把叶子放在桌上。她轻轻吹一口气，金叶子又转了一圈。

苏西说：“现在我也相信了，它真的很会跳舞。”

## 2. 瑞贝卡的小蓝盒大逃跑

小兔瑞贝卡有一个小蓝盒。她要把河边最漂亮的贝壳装进去。

小狗丹尼陪她一起找。他们找到一枚白贝壳，像小月亮。

瑞贝卡把贝壳放进盒子里。“嗒！”盒子关好了。

可是她刚把盒子放到石头上，小蓝盒就顺着斜坡滑走了。

“我的盒子逃跑啦！”瑞贝卡大叫。

丹尼汪汪追，瑞贝卡蹦蹦追。小蓝盒滚过草地，撞到一朵蘑菇，又弹到浅水边。

丹尼停下来闻了闻。“它会往低处跑，我们去小水沟前面等。”

他们跑到小水沟前。小蓝盒果然“咚”地撞进丹尼的帽子里。

瑞贝卡打开盒子，小月亮贝壳还好好的。

“它不是逃跑。”丹尼说，“它只是坐了一次滑梯。”

瑞贝卡抱着盒子说：“下次滑梯，要先告诉我！”

## 3. 琪琪的飞行图乱飞了

魔女琪琪画了一张飞行图，准备送给索纳姐姐。图上有屋顶、钟楼和一条弯弯的小路。

黑猫吉吉看了看天空。“今天的风有点调皮。”

琪琪刚把图放进篮子，风就“呼啦”一下，把飞行图卷走了。

“站住！”琪琪骑上扫帚追。

飞行图飞到树梢。琪琪伸手，没抓到。

飞行图飞到屋顶。琪琪又伸手，还是没抓到。

吉吉蹲在墙头说：“别追它，看它要去哪儿。”

琪琪停下来一看，树叶、纸片和飞行图都往钟楼后面的小巷飞。

“我知道了！”琪琪骑到小巷口，张开篮子。

飞行图转呀转，正好掉进篮子里。

索纳姐姐收到图，笑着说：“这张图一定认识路，它自己先飞了一遍。”

## 4. 向日葵和叮咚种子

向日葵在花园里晒太阳，忽然听见泥土里“叮咚”一声。

豌豆射手马上探头：“是谁在敲门？”

他们扒开泥土，发现一颗圆圆的小种子。

“它会唱歌！”豌豆射手说。

他们把种子种进小坑。向日葵浇水，豌豆射手守门。

第二天一早，小坑空了。

“种子跑了！”豌豆射手急得喷出一颗豌豆，“啪！”

向日葵看见地上有一串湿泥点。“它没有脚，可能是水把它冲走了。”

他们顺着泥点找，找到水桶后面。小种子卡在那里，小声“叮……咚……”

豌豆射手搬来小石子，围成一圈小围墙。向日葵重新把种子种好。

几天后，嫩芽冒出来了。风一吹，叶子叮咚叮咚响。

豌豆射手说：“这次它不跑了，它开音乐会了！”

## 5. 红星纸飞机救援队

小月折了一只纸飞机，翅膀上画着一颗红星。

小梅说：“让它飞到大树那边吧。”

小月用力一扔。纸飞机“嗖”地飞出去，飞过草地，飞过小路，最后卡在高高的树枝上。

小月跳了三下，够不到。

小梅搬来小凳子，还是够不到。

乌鸦多多飞来问：“你们在摘苹果吗？”

“不是，是救飞机！”小月说。

多多飞上树枝看了看：“飞机卡在第三根树枝，尾巴被叶子夹住了。”

小梅找来竹竿。多多在上面指挥：“左一点，右一点，别戳我的脚！”

竹竿轻轻一拨，纸飞机“哗啦”落下来。

小月接住飞机，红星还亮亮的。

多多说：“下次它再飞高一点，我就收停机费。”

## 6. 钥匙不想上班

倭瓜校长早晨要打开图书角，可是钥匙不见了。

“钥匙迟到了！”莲小蓬说。

树桩老师翻口袋，倭瓜校长翻抽屉，莲小蓬翻书包。没有，还是没有。

图书角门后传来同学们的声音：“我们想看书！”

倭瓜校长急得在原地转圈。“昨天我还拿着它去花坛扶小花。”

三个人跑到花坛边。泥土上有一个小印子，像钥匙躺过。

树桩老师拨开叶子，没有。

莲小蓬低头一看：“花盆下面有东西亮了一下！”

他们合力抬起花盆。钥匙躺在下面，身上全是泥。

“它不是迟到。”树桩老师说，“它在帮小花压住花盆。”

倭瓜校长擦干净钥匙，打开图书角。第一本被借走的书，名字叫《钥匙今天很忙》。

## 7. 雪城堡点灯大会

冰西瓜和充能柚子在雪地里造城堡。

冰西瓜负责堆墙：“一块，两块，三块！”

充能柚子负责小灯：“一盏，两盏，三盏！”

城堡快造好时，小灯袋不见了。

“点灯大会要失败了！”充能柚子急得跳起来，身上的电光噼啪响。

冰西瓜蹲下看雪地。“这里有深脚印，是我的。这里有浅脚印，像小灯袋拖出来的。”

他们顺着浅脚印走。脚印绕过城堡，绕过雪球，最后停在小松树旁。

小灯袋挂在树枝上，被风吹得一晃一晃。

充能柚子踮脚够不到。冰西瓜滚来一个雪球，当小台阶。

“够到了！”充能柚子拿回小灯。

傍晚，小灯一盏盏亮起。雪城堡变成蓝蓝亮亮的。

冰西瓜宣布：“点灯大会开始！”

充能柚子小声说：“下次，小灯袋也要买门票。”

## 8. 胖胖追午餐篮

胖猫胖胖和白猫莉莉去草坡野餐。

胖胖带了午餐篮。里面有鱼饼、苹果和一块小花布。

他刚坐下，风一吹，篮子就骨碌骨碌滚走了。

“我的鱼饼！”胖胖拔腿就追。

莉莉喊：“别直追，篮子会往坡下滚！”

胖胖还是追。他追得太快，自己也骨碌一下滚到草地上。

“我也变成篮子了！”胖胖晕乎乎地说。

莉莉沿着小路跑到坡底，张开小花布。午餐篮正好滚过来，“扑通”一下停在布上。

胖胖爬起来，拍掉身上的草。苹果滚出来三个，鱼饼还在。

莉莉找来一块石头，压住篮子。

风又吹了一下。篮子不动了。胖胖赶紧抱住鱼饼。

“这次，”他说，“我要先吃会逃跑的那一块。”

## 9. 希达的线团迷宫

巴鲁和希达在山坡上放风筝。风筝上画着一朵白云。

风一来，风筝飞得又高又远。

希达摸摸口袋：“备用线团不见了！”

原来口袋被树枝刮破，线团滚进了草丛。

风筝越飞越高，线越来越短。

“我拉住风筝，你找线团！”希达说。

巴鲁趴在草地上看。草叶被压弯了一条细细的路，像小迷宫。

他顺着草路爬，钻过蒲公英，绕过扁石头，最后听见“咕噜”一声。

线团卡在石头后面，还想继续滚。

“抓到你了！”巴鲁把线团抱回来。

他们把新线接上，风筝又稳稳飞起来。

希达低头看破口袋，说：“回家第一件事，补口袋。”

巴鲁说：“第二件事，给线团系安全带。”

## 10. 会打喷嚏的糖果屋

魔女琪琪和黑猫吉吉在森林里迷路了。

他们走着走着，看见一座小房子。屋顶是饼干，窗户是果冻，门把手是一颗圆圆的草莓糖。

吉吉吸了吸鼻子：“这房子闻起来很甜。”

琪琪刚要敲门，房子忽然“阿嚏！”一声，把糖霜喷到了吉吉胡子上。

屋里传来细细的声音：“不是感冒，是烟囱堵住了。”

琪琪爬上屋顶一看，烟囱里卡着三颗棉花糖。

吉吉找来树枝，琪琪轻轻一拨。第一颗落进帽子，第二颗粘上扫帚，第三颗飘下来，像一朵小云。

烟囱通了。糖果屋打开门，请他们喝热可可。

吉吉舔了舔胡子说：“我喜欢这座房子，因为它打喷嚏也很甜。”

## 11. 小龙猫的月亮汤

小梅和小龙猫在院子里煮汤。

锅里有蘑菇、青豆和一片圆圆的白萝卜。小龙猫说：“这是月亮汤。”

汤快好时，白萝卜不见了。

小梅拿勺子捞，捞到蘑菇，捞到青豆，就是捞不到月亮。

小龙猫趴在锅边看。热气一飘，锅盖上有一个圆圆的白影子。

“月亮跑到天上了！”它小声说。

小梅笑了笑，把锅盖翻过来。原来白萝卜贴在锅盖下面，被热气托住了。

小龙猫用勺子轻轻一碰，白萝卜“扑通”掉回汤里。

他们把汤盛进两个小碗。每个碗里都有半个月亮。

小龙猫喝了一口，说：“今天的月亮有点咸。”

## 12. 多多的反话帽

乌鸦多多捡到一顶红帽子，帽檐上缝着一颗小铃铛。

他把帽子戴上，想夸小凯的积木塔真高。

可是他一开口，却说：“你的塔真矮！”

小凯愣住了。多多赶紧捂住嘴。

他想说“对不起”，嘴里却冒出：“我才不对不起呢！”

小凯看了看帽子：“也许它是一顶反话帽。”

他们把帽子摘下来，放到椅子上。小凯问：“你喜欢蛋糕吗？”

帽子上的铃铛“叮”了一下，多多的嘴巴自己说：“我最讨厌蛋糕！”

这下他们都笑了。

小凯在帽子里塞了一张纸条，写着：“我说的话要倒过来听。”

多多重新戴上帽子，认真地说：“我一点也不高兴。”

铃铛叮叮响，像在偷偷笑。

## 13. 佩奇的影子跳绳

佩奇带了一根红跳绳去草地。

苏西说：“我们比赛，看谁跳得多。”

佩奇跳了三下，忽然停住：“我的影子也想跳。”

她把绳子甩起来，影子在地上跟着一上一下，好像真的跳过了红线。

可是云飘过来，影子不见了。

“它累了，躲起来喝水了。”佩奇说。

苏西抬头看云，又看草地。她把跳绳摆成一个大圆圈。

“我们给影子留个座位。”她说。

云慢慢飘走，影子回来了，正好站在圆圈里。

佩奇又跳起来。她跳一下，影子跳一下。

苏西数着：“一，二，三，四！”

佩奇喘着气说：“我赢了。”

苏西指着地上：“不，是你的影子赢了。它一次也没绊倒。”

## 14. 瑞贝卡和会变长的胡萝卜

瑞贝卡在菜园里拔胡萝卜。

她看见一根胡萝卜露出绿叶，绿叶弯弯的，像小兔耳朵。

“这根一定最大。”瑞贝卡说。

小狗丹尼咬住她的围裙帮忙。瑞贝卡拔呀拔，丹尼退呀退。

胡萝卜没有出来，绿叶却越拉越长，像一条绿色围巾。

“它是不是住得太舒服，不想搬家？”丹尼问。

瑞贝卡蹲下来，拨开泥土一看，原来绿叶缠住了地下的一根老树根。

丹尼用爪子刨土，瑞贝卡把叶子轻轻解开。

这次一拔，胡萝卜“啵”地跳出来，只有手指那么短。

瑞贝卡眨眨眼。

丹尼闻了闻，说：“它不是大胡萝卜，它只是戴了一条长围巾。”

瑞贝卡把小胡萝卜洗干净，决定把第一口让给它的围巾。

## 15. 索纳姐姐的口袋星星

索纳姐姐做了一件蓝围裙，围裙上有一个小口袋。

琪琪说：“这个口袋太空了。”

她从窗台上拿来一颗纸星星，放进口袋里。纸星星亮闪闪的。

晚上，索纳姐姐要点灯，却发现纸星星不见了。

吉吉在地板上闻了闻，只闻到一点点胶水味。

琪琪看见门缝下面有一道小亮光。

他们推开门，发现纸星星粘在扫帚尾巴上。扫帚正靠在墙边，尾巴翘得高高的，好像偷偷长了一颗星。

琪琪想把星星取下来，扫帚却轻轻晃了一下。

“它想飞。”索纳姐姐说。

她把纸星星重新缝到围裙口袋上，又在旁边缝了一根小线。

第二天，索纳姐姐走路时，纸星星一摇一摇。

吉吉说：“现在它不用飞，也会散步了。”

## 16. 冰西瓜的热茶杯

冰西瓜收到一只红茶杯。

充能柚子倒了一点热茶进去。茶杯立刻冒出白白的气。

冰西瓜很想喝，可是一靠近，鼻尖就结出一粒小水珠。

“太热了。”它说。

充能柚子想了想，拿来一把小扇子。扇一下，热气跑到左边；再扇一下，热气跑到右边。

茶杯像在吐白胡子。

冰西瓜等不及，轻轻吹了一口冷气。茶面上马上结了一层薄薄的冰。

“糟了，茶戴帽子了！”充能柚子说。

他们把茶杯放到窗边。太阳照了一会儿，冰帽慢慢化开。

冰西瓜终于喝了一小口。

它眯起眼睛说：“现在刚刚好。”

充能柚子看着杯口最后一点白气：“热茶也学会小声说话了。”

## 17. 莲小蓬和困住的彩虹

雨停后，莲小蓬在操场边看见一小段彩虹。

它没有挂在天上，而是躺在水洼里，红橙黄绿蓝，亮得像糖纸。

树桩老师走过来问：“你在看什么？”

“彩虹掉进水里了。”莲小蓬说，“它会不会回不了家？”

她拿来小铲子，想把水洼边的泥挖开。

树桩老师拦住她：“先看看彩虹从哪里来。”

莲小蓬蹲低一点，看见太阳照着教室窗户，窗户又把光照进水洼里。

她站起来，彩虹不见了。她蹲下，彩虹又回来了。

“原来它在和我捉迷藏。”莲小蓬说。

云又飘过来，水洼变成灰色。

莲小蓬没有着急。她把一片叶子放在水边，说：“等太阳回来，你可以坐在这里休息。”

## 18. 胖胖的会唱歌鱼饼

胖猫胖胖买了一块鱼饼。

鱼饼上有两颗芝麻眼睛，看起来像在看他。

白猫莉莉说：“我们先回家再吃。”

胖胖点点头，可鱼饼忽然发出“咪咪咪”的声音。

胖胖吓得差点把袋子扔掉。

莉莉打开袋子。鱼饼安安静静，一点也不像会唱歌。

他们继续走，声音又来了：“咪咪咪。”

胖胖说：“它在唱告别歌，因为马上要被吃掉了。”

莉莉低头看袋子，发现袋底破了一个小洞。风从洞里钻进去，吹得油纸发响。

她用一片树叶贴住小洞，声音停了。

回到家，胖胖把鱼饼放在盘子里。

他想了想，又在袋子的小洞上吹了一口气。

“咪咪咪。”

胖胖高兴地说：“吃饭前，它还能再唱一首。”

## 19. 巴鲁的云朵船票

巴鲁用树叶做了一张船票。

他要和希达去小溪边，坐自己做的树皮船。

船票上画着一朵云。巴鲁把它放进口袋，可走到溪边时，船票不见了。

“没有船票，船会不会不让我们坐？”巴鲁问。

希达看了看他的口袋，那里有一道湿湿的水印。

他们顺着水印找，找到一块扁石头旁边。

船票贴在石头上，被溪水打湿，云朵变成了一团胖胖的蓝影子。

巴鲁小心地拿起它。船票软得像煮过的菜叶。

希达把它放在阳光下晒。

树皮船等在水边，一点也不着急。

船票晒干后，云朵皱皱的，像刚睡醒。

巴鲁把船票放在船头。小船顺水漂走时，那朵云也跟着出发了。

## 20. 霸王花的打嗝花蜜

霸王花准备了一罐花蜜，要请向日葵尝尝。

她刚打开盖子，花蜜就“嗝”了一声，冒出一个金色泡泡。

向日葵睁大眼睛：“花蜜也会打嗝？”

霸王花有点不好意思。她用花藤搅了搅，花蜜又“嗝”了一声，泡泡飞到空中，变成一颗小太阳。

豌豆射手跑来看热闹，差点被泡泡粘住鼻子。

向日葵闻了闻：“里面是不是掉进了蜂蜜糖？”

霸王花低头一看，罐底果然有一粒会冒泡的小糖。

她用勺子把糖捞出来，放进清水杯里。清水立刻咕噜咕噜，像在笑。

花蜜安静了。

向日葵喝了一小口，说：“很好喝。”

豌豆射手看着那杯泡泡水，小声问：“打嗝的那杯，我也能尝尝吗？”

## 21. 倭瓜校长和会躲的黑板擦

倭瓜校长要擦黑板。

黑板上写着今天的字：“云、门、鱼、月亮。”

可是黑板擦不见了。

莲小蓬说：“它是不是不想擦掉月亮？”

树桩老师看见讲台上有一条白白的粉笔灰，像小路一样通到窗边。

他们顺着粉笔灰找，看见黑板擦卡在窗帘后面。

风一吹，窗帘鼓起来，黑板擦就跟着一上一下，像在荡秋千。

倭瓜校长把它拿下来，拍了拍灰。

黑板擦“噗”地吐出一小团粉笔云。

莲小蓬笑了：“它不是躲起来，它在窗帘后面擦天空。”

倭瓜校长擦黑板时，特意把“月亮”两个字留到最后。

擦完以后，黑板很干净。只有窗台上，还坐着一小团白粉笔灰。

## 22. 小月的瓶中海

小月在海边捡到一个透明小瓶。

她装进一点海水、一粒白沙和一片很小的海草。

小凯说：“现在你有一片小海了。”

小月把瓶子放在窗台上。第二天早上，瓶子里少了一半水。

“小海逃跑了！”小月急得拿起瓶子。

小凯看见瓶口没有盖紧，窗台上有一圈淡淡的水印。

他们顺着水印看，发现阳光正照在玻璃上，瓶子里还有一层亮亮的水汽。

“它没有逃跑，它爬到瓶壁上看风景了。”小凯说。

小月把瓶盖拧好，又在瓶身上画了一只小船。

她轻轻摇一摇，海草在里面弯来弯去。

小船没有真的动，可它的影子在窗台上漂了一下。

小月说：“我的小海今天出门很近，只去了瓶子里面。”

## 23. 菜问的鞋带桥

菜问有一根绿色鞋带。

它想用鞋带给小蚂蚁搭一座桥，从花盆这边到花盆那边。

闪电芦苇跑来帮忙。它跑得太快，风把鞋带吹成一个结。

菜问解了半天，鞋带越解越像一个小包子。

“对不起。”闪电芦苇停在旁边，叶子都垂下来了。

菜问没有生气。它把鞋带结放在地上，看了一会儿。

一只小蚂蚁爬过来，从结洞里钻进去，又从另一边钻出来。

接着，第二只、第三只也钻了过去。

“它们不用桥了。”菜问说，“它们有隧道。”

闪电芦苇小心地吹了一口很小的风。鞋带结轻轻晃了晃，像一座绿色小山。

傍晚，菜问还是把结解开了。

不过它没有忘记，桥有时候也可以先打一个结。

## 24. 苏怡的条纹迷路了

斑马苏怡洗完澡，站在阳光下晒干。

小春忽然说：“你背上少了一条黑条纹！”

苏怡吓了一跳，转头看，可怎么也看不到自己的背。

小春绕着她找，草地上没有，水桶里没有，毛巾上也没有。

“我的条纹会不会自己去散步了？”苏怡问。

这时，一阵风吹来，晾衣绳上的黑围巾飘到苏怡背后。

小春看见了，笑得坐到草地上。

原来苏怡晒太阳时，背上有一块地方还湿着，阳光照上去亮亮的，看起来像少了一条纹。

小春拿毛巾轻轻擦干。

那条黑条纹慢慢显出来了。

苏怡松了一口气：“它回家了。”

小春把黑围巾搭在自己肩上：“如果它再迷路，我可以先借你一条。”

## 25. 玉米大炮的爆米花云

玉米大炮想做一朵爆米花云。

它把玉米粒装好，对着蓝天说：“我要轻轻地放。”

霸王花坐在旁边，准备接住落下来的爆米花。

“砰！”

爆米花没有变成云，只变成一串小白点，落进草丛里。

霸王花低头找，一朵也没接到。

玉米大炮有点失望，又试了一次。这回它把炮口抬得更高。

“砰！”

爆米花飞上去，被一阵风托住，挤在一起，真的像一朵小云。

可是小云马上飘向池塘。

霸王花伸长花藤去捞。花藤刚碰到水面，小云就散开了，变成许多白白的小船。

玉米大炮赶紧说：“别捞了。”

他们坐在池塘边，看爆米花小船慢慢漂。

霸王花说：“今天没有吃到云。”

玉米大炮说：“可是我们放走了一群会香的小船。”

## 26. 吉吉和午夜纽扣

索纳姐姐的黑外套掉了一颗纽扣。

纽扣也是黑色的，掉在夜里，像藏进了夜里。

黑猫吉吉负责找它。

琪琪拿着小灯，在地板上一格一格照。灯光照到茶杯，茶杯亮了；照到鞋尖，鞋尖亮了。

可是纽扣一直不亮。

吉吉趴下来，用爪子摸。它摸到线头，摸到一粒面包屑，最后摸到一个圆圆的小东西。

“找到了！”琪琪说。

吉吉把圆东西推出来，原来是一颗葡萄干。

索纳姐姐笑着说：“这颗不能缝到外套上。”

吉吉没有放弃。它忽然看见自己的尾巴尖勾着什么。

黑纽扣挂在尾巴毛里，一路跟着它找自己。

琪琪把纽扣取下来。

吉吉看着尾巴说：“它找到了我，比我找到它还快。”

## 27. 小春的雪花闹钟

小春不想睡过头。

她做了一个雪花闹钟：把一片纸雪花放在窗台上，等太阳照到它，就起床。

第二天早上，窗外下起小雨，太阳没有来。

纸雪花软软地趴在窗台上，一点也不亮。

小春揉着眼睛问：“闹钟坏了吗？”

斑马苏怡来看，发现窗台下有一排小水滴，滴答，滴答，很有节奏。

“我们可以听雨点。”苏怡说。

她们数了三十个滴答，小春穿好袜子。又数三十个滴答，小春叠好被子。

等她洗完脸，云散开了。

太阳照到纸雪花，雪花慢慢翘起一个角。

小春把它拿起来，发现它变皱了。

“你今天也早起了。”她对纸雪花说。

苏怡说：“而且它洗了一个小雨澡。”

## 28. 双头射手的左信和右信

双头射手要送两封信。

左边的头叼着给向日葵的信，右边的头叼着给冰西瓜的信。

走到半路，风吹来，两封信在空中转了个圈，又落回嘴边。

双头射手停住了。

“哪封是你的？”左边问。

“我也忘了。”右边说。

它们把信放在石头上。两封信一模一样，都系着绿线。

这时，充能柚子路过，看见其中一封信角上有一点水印。

“冰西瓜的信可能有水印。”它说。

双头射手想起来，冰西瓜刚才摸过那封信，手凉凉的。

他们把有水印的送给冰西瓜，另一封送给向日葵。

两封都送对了。

回家路上，左边的头说：“下次我们写名字。”

右边的头说：“下次我们先不要被风考题。”

## 29. 大龙猫的鼾声云梯

大龙猫在大树下睡午觉。

它睡得很香，鼾声一声一声：“呼噜，呼噜。”

中龙猫想摘树上的红果子，可树枝太高了。

小龙猫说：“我们等大龙猫醒来帮忙吧。”

可是大龙猫一翻身，鼾声变大了。树叶被吹得哗啦啦响，一颗红果子差点掉下来。

中龙猫眨眨眼：“鼾声会爬树。”

它们把一只小篮子绑在树枝下，又把篮绳牵到大龙猫鼻子旁边。

大龙猫呼噜一吹，篮子轻轻升高一点。再呼噜一吹，又升高一点。

第三声呼噜时，篮子碰到红果子，果子“咚”地落进篮里。

大龙猫醒来，看见面前摆着红果子。

“谁摘的？”它问。

中龙猫说：“你摘的。”

小龙猫补了一句：“用鼻子。”
